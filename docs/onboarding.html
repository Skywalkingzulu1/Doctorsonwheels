<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile - Doctors on Wheels</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #0052cc;
            --primary-dark: #0747a6;
            --secondary: #00a3bf;
            --accent: #36b37e;
            --bg: #f4f5f7;
            --white: #ffffff;
            --text: #172b4d;
            --text-light: #6b778c;
            --border: #dfe1e6;
            --error: #de350b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .onboard-card {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 550px;
            width: 100%;
        }
        .onboard-card h1 { color: var(--primary); font-weight: 800; margin-bottom: 0.3rem; }
        .onboard-card h1 span { color: var(--secondary); }
        .onboard-card .subtitle { color: var(--text-light); margin-bottom: 2rem; font-size: 0.95rem; }
        .step-indicator { display: flex; gap: 0.5rem; margin-bottom: 2rem; justify-content: center; }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
        .step-dot.active { background: var(--primary); }
        .step-dot.completed { background: var(--accent); }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.9rem; color: var(--text); }
        .form-group input, .form-group select {
            width: 100%; padding: 0.8rem; border: 1px solid var(--border);
            border-radius: 8px; font-size: 1rem;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .btn {
            width: 100%; padding: 1rem; border: none; border-radius: 8px;
            background: var(--primary); color: white; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .btn:hover { background: var(--primary-dark); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        #error-message {
            color: var(--error); background: #ffebe6; padding: 0.8rem;
            border-radius: 8px; margin-bottom: 1rem; display: none; font-size: 0.9rem;
        }
        #success-message {
            color: var(--accent); background: #e3fcef; padding: 0.8rem;
            border-radius: 8px; margin-bottom: 1rem; display: none; font-size: 0.9rem;
        }
        .skip-link { display: block; text-align: center; margin-top: 1rem; color: var(--text-light); font-size: 0.85rem; cursor: pointer; }
        .skip-link:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="onboard-card">
        <h1>Doctors on <span>Wheels</span></h1>
        <p class="subtitle">Complete your doctor profile to start receiving patients</p>

        <div class="step-indicator">
            <div class="step-dot completed"></div>
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>

        <div id="error-message"></div>
        <div id="success-message"></div>

        <form id="onboardForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="docName" required placeholder="Dr. John Doe">
            </div>
            <div class="form-group">
                <label>Specialty</label>
                <select id="docSpecialty" required>
                    <option value="">Select your specialty</option>
                    <option value="General Practitioner">General Practitioner</option>
                    <option value="Cardiology">Cardiology</option>
                    <option value="Dermatology">Dermatology</option>
                    <option value="Pediatrics">Pediatrics</option>
                    <option value="Psychiatry">Psychiatry</option>
                    <option value="Obstetrics & Gynecology">Obstetrics & Gynecology</option>
                    <option value="Orthopedics">Orthopedics</option>
                    <option value="Neurology">Neurology</option>
                    <option value="Internal Medicine">Internal Medicine</option>
                    <option value="Family Medicine">Family Medicine</option>
                </select>
            </div>
            <div class="form-group">
                <label>Area / Location</label>
                <input type="text" id="docArea" required placeholder="e.g., Sandton, Johannesburg">
            </div>
            <div class="form-group">
                <label>Consultation Fee (Credits)</label>
                <input type="number" id="docFee" min="50" step="10" value="150" required>
            </div>
            <div class="form-group">
                <label>HPCSA Number (Optional)</label>
                <input type="text" id="docHpcsa" placeholder="e.g., MP12345">
            </div>
            <div class="form-group">
                <label>Practice Number</label>
                <input type="text" id="docPracticeNum" placeholder="e.g., 1234567">
            </div>
            <button type="submit" class="btn" id="submitBtn"><i class="fas fa-check"></i> Complete Profile</button>
        </form>

        <div class="skip-link" onclick="skipOnboarding()">Skip for now — I'll do this later</div>
    </div>

    <script>
        const API_BASE = window.API_BASE_URL;

        async function loginAndSetup(email) {
            const demoPasswords = { 'doc@docmail.com': 'test123', 'zulu@docmail.com': 'test123' };
            const password = demoPasswords[email] || 'test123';
            try {
                const res = await fetch(API_BASE + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                if (!res.ok) throw new Error('Login failed');
                const data = await res.json();
                localStorage.setItem('token', data.access_token);
                return data.access_token;
            } catch (e) {
                console.error('Auto-login failed:', e);
                return null;
            }
        }

        document.getElementById('onboardForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

            const name = document.getElementById('docName').value.trim();
            const specialty = document.getElementById('docSpecialty').value;
            const area = document.getElementById('docArea').value.trim();
            const fee = parseInt(document.getElementById('docFee').value) || 150;
            const hpcsa = document.getElementById('docHpcsa').value.trim();
            const practiceNum = document.getElementById('docPracticeNum').value.trim();

            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            try {
                let token = localStorage.getItem('token');
                const params = new URLSearchParams(window.location.search);
                const email = params.get('email');

                if (!token && email) {
                    token = await loginAndSetup(email);
                }

                if (!token) {
                    errorDiv.textContent = 'Please login first.';
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check"></i> Complete Profile';
                    return;
                }

                const res = await fetch(API_BASE + '/api/profile/doctor', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({
                        name, specialty, area,
                        consultation_fee: fee,
                        hpcsa_number: hpcsa || null,
                        practice_number: practiceNum || null
                    })
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || 'Failed to save profile');
                }

                successDiv.textContent = 'Profile completed! Redirecting to your dashboard...';
                successDiv.style.display = 'block';

                localStorage.setItem('token', token);
                setTimeout(() => {
                    window.location.href = 'doctor_dashboard.html';
                }, 1000);
            } catch (e) {
                errorDiv.textContent = e.message;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> Complete Profile';
            }
        });

        function skipOnboarding() {
            window.location.href = 'doctor_dashboard.html';
        }
    </script>
</body>
</html>
