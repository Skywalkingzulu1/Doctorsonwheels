<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultation Details - Doctors on Wheels</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--primary:#0052cc;--primary-dark:#0747a6;--secondary:#00a3bf;--accent:#36b37e;--warning:#ffab00;--danger:#de350b;--light:#f4f5f7;--white:#fff;--text:#172b4d;--text-light:#6b778c;--border:#dfe1e6}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--light);color:var(--text);line-height:1.5}
        .container{max-width:800px;margin:2rem auto;padding:0 1rem}
        .header{background:var(--white);padding:2rem;border-radius:12px 12px 0 0;border:1px solid var(--border);border-bottom:none;text-align:center}
        .header h1{color:var(--primary);font-size:1.8rem;margin-bottom:0.5rem}
        .header h1 span{color:var(--secondary)}
        .header p{color:var(--text-light)}
        .form-card{background:var(--white);padding:2rem;border-radius:0 0 12px 12px;border:1px solid var(--border);box-shadow:0 4px 6px rgba(0,0,0,0.05)}
        .section{margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
        .section:last-child{border-bottom:none}
        .section-title{font-size:1.2rem;font-weight:700;color:var(--primary);margin-bottom:1.5rem;display:flex;align-items:center;gap:0.5rem}
        .form-group{margin-bottom:1.2rem}
        .form-label{display:block;margin-bottom:0.4rem;font-weight:600;font-size:0.9rem}
        .form-input{width:100%;padding:0.75rem;border:1px solid var(--border);border-radius:8px;font-size:1rem;transition:border-color 0.2s}
        .form-input:focus{outline:none;border-color:var(--primary)}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
        @media(max-width:600px){.grid{grid-template-columns:1fr}}
        .checkbox-group{display:flex;flex-wrap:wrap;gap:1rem}
        .checkbox-item{display:flex;align-items:center;gap:0.5rem;font-size:0.95rem;cursor:pointer}
        .checkbox-item input{width:18px;height:18px;cursor:pointer}
        .footer{margin-top:2rem;display:flex;justify-content:space-between;align-items:center}
        .btn{padding:0.8rem 2rem;border:none;border-radius:8px;font-weight:700;cursor:pointer;transition:all 0.2s;font-size:1rem}
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:hover{background:var(--primary-dark)}
        .btn-secondary{background:var(--light);color:var(--text);border:1px solid var(--border)}
        table{width:100%;border-collapse:collapse;margin-top:1rem}
        th,td{padding:0.8rem;text-align:left;border:1px solid var(--border)}
        th{background:var(--light);font-weight:600;font-size:0.85rem}
        textarea.form-input{min-height:100px;resize:vertical}
        .required::after{content:" *";color:var(--danger)}
    </style>
    <script src="config.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Doctors on <span>Wheels</span></h1>
            <p>Consultation Information Questionnaire</p>
            <div style="margin-top:1rem; padding:0.8rem; background:#eef2ff; border-radius:8px; font-size:0.9rem; color:var(--primary); font-weight:600;">
                <i class="fas fa-info-circle"></i> Provide rich info to help your doctor prepare for the call.
            </div>
        </div>
        <div class="form-card">
            <form id="questionnaireForm">
                <!-- 1. Patient Information -->
                <div class="section">
                    <h2 class="section-title"><i class="fas fa-user"></i> 1. Patient Information</h2>
                    <div class="form-group">
                        <label class="form-label required">Full Name</label>
                        <input type="text" name="full_name" class="form-input" required>
                    </div>
                    <div class="grid">
                        <div class="form-group">
                            <label class="form-label">Preferred Name</label>
                            <input type="text" name="preferred_name" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label required">Date of Birth</label>
                            <input type="date" name="dob" class="form-input" required>
                        </div>
                    </div>
                    <div class="grid">
                        <div class="form-group">
                            <label class="form-label required">Gender</label>
                            <select name="gender" class="form-input" required>
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Non-binary">Non-binary</option>
                                <option value="Other">Other</option>
                                <option value="Prefer not to say">Prefer not to say</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Pronouns</label>
                            <input type="text" name="pronouns" class="form-input" placeholder="e.g. they/them">
                        </div>
                    </div>
                </div>

                <!-- 4. Medical History -->
                <div class="section">
                    <h2 class="section-title"><i class="fas fa-notes-medical"></i> 2. Detailed Medical History</h2>
                    <div class="form-group">
                        <label class="form-label required">Reason for this specific consultation</label>
                        <textarea name="health_concerns" class="form-input" required placeholder="Describe your symptoms and concerns..."></textarea>
                    </div>

                    <div class="grid">
                        <div class="form-group">
                            <label class="form-label required">Duration of symptoms</label>
                            <input type="text" name="symptom_duration" class="form-input" required placeholder="e.g. 3 days, 2 weeks">
                        </div>
                        <div class="form-group">
                            <label class="form-label required">Pain / Severity Scale (1-10)</label>
                            <select name="severity_scale" class="form-input" required>
                                <option value="">Select Severity</option>
                                <option value="1">1 - Minimal</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4 - Mild</option>
                                <option value="5">5</option>
                                <option value="6">6 - Moderate</option>
                                <option value="7">7</option>
                                <option value="8">8 - Severe</option>
                                <option value="9">9</option>
                                <option value="10">10 - Worst possible</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Past Medical Conditions (Select all that apply)</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="conditions" value="Diabetes"> Diabetes</label>
                            <label class="checkbox-item"><input type="checkbox" name="conditions" value="High Blood Pressure"> High Blood Pressure</label>
                            <label class="checkbox-item"><input type="checkbox" name="conditions" value="Heart Disease"> Heart Disease</label>
                            <label class="checkbox-item"><input type="checkbox" name="conditions" value="Asthma"> Asthma</label>
                            <label class="checkbox-item"><input type="checkbox" name="conditions" value="Cancer"> Cancer</label>
                            <label class="checkbox-item"><input type="checkbox" name="conditions" value="Depression/Anxiety"> Depression/Anxiety</label>
                            <label class="checkbox-item"><input type="checkbox" name="conditions" value="Thyroid Disease"> Thyroid Disease</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Current Medications & Known Allergies</label>
                        <textarea name="meds_allergies" class="form-input" placeholder="Please list any current medications and allergies..."></textarea>
                    </div>
                </div>

                <!-- 5. Lifestyle -->
                <div class="section">
                    <h2 class="section-title"><i class="fas fa-heartbeat"></i> 3. Lifestyle & Habits</h2>
                    <div class="grid">
                        <div class="form-group">
                            <label class="form-label">Tobacco Use</label>
                            <select name="tobacco" class="form-input">
                                <option value="Never">Never</option>
                                <option value="Former">Former Smoker</option>
                                <option value="Current">Current Smoker</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Alcohol Use</label>
                            <select name="alcohol" class="form-input">
                                <option value="None">None</option>
                                <option value="Occasional">Occasional</option>
                                <option value="Weekly">Weekly</option>
                                <option value="Daily">Daily</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="footer">
                    <button type="button" id="btnCancel" class="btn btn-secondary">Skip for now</button>
                    <button type="submit" class="btn btn-primary" id="btnSubmit">Submit Information</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const appointmentId = urlParams.get('appointment_id');
        const returnUrl = urlParams.get('return') || 'patient_dashboard.html';
        const authToken = localStorage.getItem('token');
        const SESSION_KEY = 'dow_questionnaire_draft';
        const SESSION_FORM_KEY = 'dow_questionnaire_form';

        function serializeForm() {
            const form = document.getElementById('questionnaireForm');
            if (!form) return null;
            const data = {};
            const inputs = form.querySelectorAll('input, select, textarea');
            inputs.forEach(el => {
                if (!el.name) return;
                if (el.type === 'checkbox') {
                    if (!data[el.name]) data[el.name] = [];
                    if (el.checked) data[el.name].push(el.value);
                } else {
                    data[el.name] = el.value;
                }
            });
            return data;
        }

        function deserializeForm(data) {
            if (!data) return;
            Object.keys(data).forEach(name => {
                const el = document.querySelector(`[name="${name}"]`);
                if (!el) return;
                if (el.type === 'checkbox') {
                    const vals = Array.isArray(data[name]) ? data[name] : [data[name]];
                    el.checked = vals.includes(el.value);
                } else {
                    el.value = data[name];
                }
            });
        }

        function saveDraft() {
            const formData = serializeForm();
            if (!formData) return;
            sessionStorage.setItem(SESSION_FORM_KEY, JSON.stringify(formData));
            sessionStorage.setItem(SESSION_KEY, JSON.stringify({
                appointmentId,
                returnUrl,
                savedAt: Date.now()
            }));
        }

        function restoreDraft() {
            const raw = sessionStorage.getItem(SESSION_FORM_KEY);
            if (!raw) return false;
            try {
                const data = JSON.parse(raw);
                deserializeForm(data);
                return true;
            } catch (e) { return false; }
        }

        function clearDraft() {
            sessionStorage.removeItem(SESSION_FORM_KEY);
            sessionStorage.removeItem(SESSION_KEY);
        }

        document.getElementById('questionnaireForm').addEventListener('input', saveDraft);
        document.getElementById('questionnaireForm').addEventListener('change', saveDraft);

        window.onload = () => {
            const userData = JSON.parse(localStorage.getItem('user') || '{}');
            if (userData.name) document.querySelector('[name="full_name"]').value = userData.name;
            
            if (!authToken) {
                alert('Please login to submit this form.');
                window.location.href = 'login.html';
                return;
            }

            const hasDraft = sessionStorage.getItem(SESSION_FORM_KEY);
            if (hasDraft && !appointmentId) {
                const confirmed = confirm('You have a saved questionnaire draft. Would you like to resume it?');
                if (confirmed) {
                    restoreDraft();
                } else {
                    clearDraft();
                }
            }
        };

        document.getElementById('questionnaireForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.textContent = 'Submitting...';

            const formData = new FormData(this);
            const data = {};
            formData.forEach((value, key) => {
                if (data[key]) {
                    if (!Array.isArray(data[key])) data[key] = [data[key]];
                    data[key].push(value);
                } else {
                    data[key] = value;
                }
            });

            if (!appointmentId) {
                alert('No appointment ID found. Saving to session instead.');
                sessionStorage.setItem('patient_questionnaire', JSON.stringify(data));
                window.location.href = returnUrl;
                return;
            }

            try {
                const response = await fetch(`/api/appointments/${appointmentId}/questionnaire`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) throw new Error('Failed to submit questionnaire');
                
                alert('Information submitted successfully! Your doctor will review this before the call.');
                window.location.href = returnUrl;
            } catch (e) {
                alert('Error: ' + e.message);
                btn.disabled = false;
                btn.textContent = 'Submit Information';
            }
        });

        document.getElementById('btnCancel').addEventListener('click', () => {
            window.location.href = returnUrl;
        });
        
        window.onload = () => {
            const userData = JSON.parse(localStorage.getItem('user') || '{}');
            if (userData.name) document.querySelector('[name="full_name"]').value = userData.name;
            if (!authToken) {
                alert('Please login to submit this form.');
                window.location.href = 'login.html';
            }
        };
    </script>
</body>
</html>
