        let provider, signer, account;

        const statusBox = document.getElementById('status');
        const logBox = document.getElementById('log');
        const connectBtn = document.getElementById('connect-btn');
        const deployBtn = document.getElementById('deploy-btn');
        const contractSelect = document.getElementById('contract-select');
        const escrowArgs = document.getElementById('escrow-args');

        function addLog(msg) {
            const d = document.createElement('div');
            d.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logBox.prepend(d);
        }

        contractSelect.onchange = () => {
            escrowArgs.style.display = contractSelect.value === 'escrow.sol' ? 'block' : 'none';
        };

        async function updateStatus() {
            const rawHexChainId = await window.ethereum.request({ method: 'eth_chainId' });
            const chainId = parseInt(rawHexChainId, 16);
            
            statusBox.innerHTML = `
                ACCOUNT: ${account}<br>
                REPORTED_CHAIN: ${chainId}<br>
                SAFETY_LOCK: BYPASSED
            `;
            addLog(`MetaMask is currently reporting Chain ID ${chainId} to this page.`);
        }

        connectBtn.onclick = async () => {
            try {
                const accts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                account = accts[0];
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                
                connectBtn.style.display = 'none';
                deployBtn.style.display = 'block';
                await updateStatus();
                addLog("Ready. Choose contract and click deploy.");
            } catch (e) {
                addLog("Connect Error: " + e.message);
            }
        };

        deployBtn.onclick = async () => {
            const key = contractSelect.value;
            const data = contracts[key];
            addLog(`Initiating deployment for ${key}...`);
            deployBtn.disabled = true;

            try {
                const factory = new ethers.ContractFactory(data.abi, data.bytecode, signer);
                let tx;
                
                if (key === 'escrow.sol') {
                    const addr = document.getElementById('platform-addr').value.trim();
                    if (!ethers.isAddress(addr)) throw new Error("Invalid address");
                    tx = await factory.deploy(addr);
                } else {
                    tx = await factory.deploy();
                }

                addLog("BROADCASTING. Check your MetaMask popup for network name!");
                const contract = await tx.waitForDeployment();
                const address = await contract.getAddress();
                
                addLog("DEPLOYED SUCCESSFULLY!");
                addLog("NEW_ADDRESS: " + address);
                alert("Contract Address: " + address);
            } catch (e) {
                addLog("ERROR: " + e.message);
                deployBtn.disabled = false;
            }
        };
    </script>
